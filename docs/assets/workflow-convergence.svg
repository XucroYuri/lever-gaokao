<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Lever-GaoKao Agent 执行闭环：高召回，再收敛">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset=".55" stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#fff8e7"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset=".55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-28%" width="136%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <style>
      .font{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif}
      .kicker{font-size:22px;font-weight:780;letter-spacing:2px;fill:#1d4ed8}
      .title{font-size:64px;font-weight:860;letter-spacing:-.5px;fill:#0f172a}
      .sub{font-size:26px;font-weight:580;fill:#475569}
      .step{font-size:25px;font-weight:820;fill:#0f172a}
      .desc{font-size:19px;font-weight:560;fill:#64748b}
      .num{font-size:18px;font-weight:850;fill:#ffffff}
      .ledger{font-size:24px;font-weight:820;fill:#0f172a}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 680 C210 604 400 768 618 666 C806 580 940 494 1160 560 C1320 608 1450 555 1600 500 L1600 900 L0 900Z" fill="#edf7ff"/>
  <path d="M0 746 C220 688 356 824 620 744 C838 678 1012 734 1214 654 C1380 590 1496 646 1600 606 L1600 900 L0 900Z" fill="#ecfbf5"/>

  <g transform="translate(90 76)">
    <text class="font kicker" x="0" y="0">AGENT OPERATING SYSTEM</text>
    <text class="font title" x="0" y="86">高召回，再收敛</text>
    <text class="font sub" x="2" y="128">面对几千个院校/专业候选，Agent 不凭记忆推荐，而是维护候选池、证据和风险 ledger。</text>
  </g>

  <g transform="translate(116 238)">
    <path d="M80 140 C245 38 455 42 606 143 C762 248 943 254 1102 151 C1225 72 1340 72 1440 128" fill="none" stroke="url(#flow)" stroke-width="24" stroke-linecap="round"/>
    <path d="M1428 99 l62 36 l-67 25Z" fill="#f59e0b"/>

    <g filter="url(#shadow)">
      <g transform="translate(0 80)">
        <circle cx="80" cy="60" r="58" fill="#0f766e"/>
        <text class="font num" x="68" y="67">01</text>
        <rect x="-18" y="128" width="220" height="86" rx="20" fill="#ffffff" opacity=".88"/>
        <text class="font step" x="0" y="156">引导问诊</text>
        <text class="font desc" x="0" y="188">硬信息、学生意愿</text>
      </g>
      <g transform="translate(238 0)">
        <circle cx="80" cy="60" r="58" fill="#2563eb"/>
        <text class="font num" x="68" y="67">02</text>
        <rect x="-18" y="128" width="220" height="86" rx="20" fill="#ffffff" opacity=".88"/>
        <text class="font step" x="0" y="156">规则核验</text>
        <text class="font desc" x="0" y="188">规则、计划、位次</text>
      </g>
      <g transform="translate(476 84)">
        <circle cx="80" cy="60" r="58" fill="#6d28d9"/>
        <text class="font num" x="68" y="67">03</text>
        <rect x="-18" y="128" width="220" height="86" rx="20" fill="#ffffff" opacity=".88"/>
        <text class="font step" x="0" y="156">画像路由</text>
        <text class="font desc" x="0" y="188">空间、能力、路径</text>
      </g>
      <g transform="translate(714 108)">
        <circle cx="80" cy="60" r="58" fill="#0f9f9a"/>
        <text class="font num" x="68" y="67">04</text>
        <rect x="-18" y="128" width="220" height="86" rx="20" fill="#ffffff" opacity=".88"/>
        <text class="font step" x="0" y="156">机会雷达</text>
        <text class="font desc" x="0" y="188">行业、地域、平台</text>
      </g>
      <g transform="translate(952 26)">
        <circle cx="80" cy="60" r="58" fill="#f59e0b"/>
        <text class="font num" x="68" y="67">05</text>
        <rect x="-18" y="128" width="220" height="86" rx="20" fill="#ffffff" opacity=".9"/>
        <text class="font step" x="0" y="156">风险审计</text>
        <text class="font desc" x="0" y="188">调剂、成本、质量</text>
      </g>
      <g transform="translate(1220 58)">
        <circle cx="80" cy="60" r="58" fill="#0f172a"/>
        <text class="font num" x="68" y="67">06</text>
        <rect x="-18" y="128" width="220" height="86" rx="20" fill="#ffffff" opacity=".9"/>
        <text class="font step" x="0" y="156">方案输出</text>
        <text class="font desc" x="0" y="188">报告、表格、排序</text>
      </g>
    </g>
  </g>

  <g transform="translate(142 620)" filter="url(#shadow)">
    <rect width="1316" height="158" rx="34" fill="#ffffff"/>
    <text class="font ledger" x="42" y="52">候选池 ledger：每一次新增、剔除、降级和复入都必须留痕</text>
    <g transform="translate(42 88)">
      <rect width="248" height="48" rx="24" fill="#ecfeff"/>
      <text class="font desc" x="34" y="31" fill="#0f766e" font-weight="820">候选池：高召回</text>
      <rect x="300" width="260" height="48" rx="24" fill="#eff6ff"/>
      <text class="font desc" x="334" y="31" fill="#1d4ed8" font-weight="820">剔除/降级：有原因</text>
      <rect x="612" width="248" height="48" rx="24" fill="#f5f3ff"/>
      <text class="font desc" x="646" y="31" fill="#6d28d9" font-weight="820">待核验：不硬推</text>
      <rect x="912" width="290" height="48" rx="24" fill="#fffbeb"/>
      <text class="font desc" x="946" y="31" fill="#b45309" font-weight="820">最终组合：可解释排序</text>
    </g>
  </g>

  <g transform="translate(244 822)">
    <text class="font" x="0" y="0" font-size="24" font-weight="760" fill="#334155">原则：先扩大视野，再用规则、位次、质量、调剂和学生执行力逐层收敛。</text>
  </g>
</svg>
